<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Diary - Totem</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --bg-dark: #020617;
            --bg-accent: #0f172a;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --priority: #f59e0b;
            --priority-glow: rgba(245, 158, 11, 0.5);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 50% 0%, var(--bg-accent) 0%, var(--bg-dark) 80%);
            color: #f8fafc;
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden; user-select: none;
            position: relative;
        }
        
        /* Efeitos de Fundo (Abstract Shapes) */
        .bg-shape {
            position: absolute; border-radius: 50%; filter: blur(100px); z-index: 0; opacity: 0.4;
        }
        .shape-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: var(--primary); }
        .shape-2 { bottom: -10%; right: -10%; width: 600px; height: 600px; background: var(--priority); opacity: 0.15; }

        .header {
            padding: 50px 30px 10px 30px;
            text-align: center;
            z-index: 10;
        }
        
        .header h1 {
            font-size: 3.5rem; font-weight: 900; margin: 0;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }
        
        .header p {
            font-size: 1.5rem; color: #94a3b8; font-weight: 300; margin-top: 10px;
        }

        .main {
            flex-grow: 1;
            display: flex; justify-content: center; align-items: stretch;
            gap: 40px; padding: 40px 80px 80px 80px;
            z-index: 10;
        }

        /* Glassmorphism Buttons */
        .btn-totem {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            cursor: pointer;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
            padding: 40px;
        }

        .btn-totem::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-20deg); transition: 0.5s;
        }

        /* Responsividade Básica (Portrait Totem vs Landscape Totem) */
        @media (max-width: 900px) {
            .main { flex-direction: column; padding: 20px 40px 40px 40px; }
            .header h1 { font-size: 2.5rem; }
            .btn-totem { padding: 30px; }
        }

        /* Hover & Tap Effects */
        .btn-common:active, .btn-common:hover {
            transform: translateY(-5px);
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--primary);
            box-shadow: 0 20px 40px -10px var(--primary-glow), inset 0 0 20px rgba(59, 130, 246, 0.2);
        }
        .btn-priority:active, .btn-priority:hover {
            transform: translateY(-5px);
            background: rgba(245, 158, 11, 0.1);
            border-color: var(--priority);
            box-shadow: 0 20px 40px -10px var(--priority-glow), inset 0 0 20px rgba(245, 158, 11, 0.2);
        }

        .icon-box {
            width: 140px; height: 140px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 30px; transition: transform 0.3s;
        }
        .btn-common .icon-box {
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4);
        }
        .btn-priority .icon-box {
            background: linear-gradient(135deg, #b45309, #f59e0b);
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.4);
        }
        .icon-box svg { width: 60px; height: 60px; fill: white; }
        .btn-totem:hover .icon-box { transform: scale(1.1); }

        .btn-title { font-size: 2.8rem; font-weight: 800; margin-bottom: 15px; letter-spacing: -1px; }
        .btn-sub { font-size: 1.3rem; font-weight: 400; color: #cbd5e1; line-height: 1.5; opacity: 0.8;}
        
        .loader-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .spinner {
            width: 60px; height: 60px; border: 5px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 1s infinite linear;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Sweet Alert Resets for Dark Theme */
        .swal2-popup { background: #1e293b !important; color: white !important; border-radius: 20px !important;}
        .swal2-title { color: white !important; }
    </style>
</head>
<body>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="header">
        <h1>Bem-vindo à Clínica</h1>
        <p>Por favor, toque na tela para retirar a sua senha de atendimento</p>
    </div>

    <div class="main">
        <button class="btn-totem btn-common" onclick="requestTicket('common')">
            <div class="icon-box">
                <!-- Identidade Visual Padrão -->
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                </svg>
            </div>
            <div class="btn-title">ATENDIMENTO<br>GERAL</div>
            <div class="btn-sub">Agendamentos, Consultas<br>de Rotina e Informações</div>
        </button>

        <button class="btn-totem btn-priority" onclick="requestTicket('priority')">
            <div class="icon-box">
                <!-- Identidade Visual Prioritária -->
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm4.24 16L12 15.45 7.77 18l1.12-4.81-3.73-3.23 4.92-.42L12 5l1.92 4.53 4.92.42-3.73 3.23L16.23 18z"/>
                </svg>
            </div>
            <div class="btn-title">FILA<br>PREFERENCIAL</div>
            <div class="btn-sub">Idosos (+60), Gestantes, PNE<br>e Crianças de Colo</div>
        </button>
    </div>

    <div class="loader-overlay" id="loader">
        <div class="spinner"></div>
    </div>

    <script>
        let isProcessing = false;

        async function requestTicket(type) {
            if (isProcessing) return;
            isProcessing = true;
            document.getElementById('loader').style.display = 'flex';

            try {
                const res = await axios.post('/totem/request', { type: type });
                const ticketNumber = res.data.ticket;
                
                document.getElementById('loader').style.display = 'none';

                Swal.fire({
                    title: 'Senha Impressa!',
                    html: `Retire seu ticket na impressora logo abaixo.<br><br>Sua senha é:<br><strong style="font-size: 5rem; color: ${type==='priority' ? '#f59e0b' : '#3b82f6'}; display:block; margin-top:20px;">${ticketNumber}</strong>`,
                    icon: 'success',
                    timer: 5000, 
                    showConfirmButton: false,
                    allowOutsideClick: false,
                    background: '#1e293b'
                });

            } catch(e) {
                document.getElementById('loader').style.display = 'none';
                Swal.fire('Erro', 'Ocorreu uma falha de comunicação com a Recepção. Por favor, dirija-se ao Guichê físico.', 'error');
            } finally {
                setTimeout(() => { isProcessing = false; }, 3000);
            }
        }
        
        // ------ EASTER EGG: Painel Administrativo de Hardware ------
        document.addEventListener('keydown', async (e) => {
            // Tecla secreta: Ctrl + Alt + P (P = Printer)
            if (e.ctrlKey && e.altKey && (e.key === 'p' || e.key === 'P')) {
                e.preventDefault();
                
                // 1. Puxa config atual
                let currentConfig = { printer_name: '', is_production: false };
                try {
                    const resConfig = await axios.get('/totem/config');
                    if(resConfig.data) currentConfig = resConfig.data;
                } catch(e) { console.warn("Aba config vazia, usando default"); }

                // 1.5 Puxa lista de impressões
                let datalistHtml = '<datalist id="printerList">';
                try {
                    const resPrinters = await axios.get('/totem/printers');
                    if(resPrinters.data && resPrinters.data.length > 0) {
                        resPrinters.data.forEach(p => { datalistHtml += `<option value="${p}">`; });
                    }
                } catch(e) {}
                datalistHtml += '</datalist>';

                // 2. Abre Modal Oculto
                const { value: formValues } = await Swal.fire({
                    title: 'Configuração Física (Hardware)',
                    html: `
                        <div style="text-align: left; padding: 10px;">
                            <label class="form-label" style="display:block; margin-bottom: 5px; font-size: 0.9em; color:#cbd5e1;">Impressoras Detectadas (Selecione ou Digite o IP/Rede)</label>
                            <input id="swal-input1" class="swal2-input" list="printerList" value="${currentConfig.printer_name}" style="width: 90%; margin: 0 auto 20px;" placeholder="Ex: EPSON TM-T20X">
                            ${datalistHtml}
                            
                            <label class="form-label" style="display:block; margin-bottom: 5px; font-size: 0.9em; color:#cbd5e1;">Status Operacional</label>
                            <select id="swal-input2" class="swal2-input" style="width: 90%; margin: 0 auto;">
                                <option value="false" ${!currentConfig.is_production || currentConfig.is_production==='false' ? 'selected' : ''}>[DEV] Desligado (Apenas Teste Tela)</option>
                                <option value="true" ${(currentConfig.is_production===true || currentConfig.is_production==='true') ? 'selected' : ''}>[PROD] Ligado (Forçar Impressão Real)</option>
                            </select>
                        </div>
                    `,
                    focusConfirm: false,
                    showCancelButton: true,
                    confirmButtonText: 'Gravar na Placa',
                    cancelButtonText: 'Sair e Ignorar',
                    allowOutsideClick: false,
                    background: '#0f172a',
                    preConfirm: () => {
                        return {
                            printer_name: document.getElementById('swal-input1').value,
                            is_production: document.getElementById('swal-input2').value === 'true'
                        }
                    }
                });

                if (formValues) {
                    // 3. Salva nativamente
                    try {
                        const res = await axios.post('/totem/config', formValues);
                        Swal.fire({ 
                            icon: 'success', 
                            title: 'Sucesso', 
                            text: res.data.message, 
                            timer: 2500, 
                            showConfirmButton: false,
                            background: '#0f172a' 
                        });
                    } catch(err) {
                        Swal.fire('Erro Operacional', 'O Node.js backend não aceitou a gravação. Verifique permissões.', 'error');
                    }
                }
            }
        });
    </script>
</body>
</html>
