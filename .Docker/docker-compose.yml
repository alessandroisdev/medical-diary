name: medical_diary

services:
  web:
    image: nginx:alpine
    container_name: medical_diary_nginx
    ports:
      - "8084:80"
    volumes:
      - ../www:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - medical_network

  app:
    build:
      context: .
      dockerfile: php/Dockerfile
    container_name: medical_diary_app
    volumes:
      - ../www:/var/www/html
      - ./php/local.ini:/usr/local/etc/php/conf.d/local.ini
    depends_on:
      - db
      - redis
    networks:
      - medical_network

  db:
    image: mariadb:11.2
    container_name: medical_diary_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: medical_diary
      MYSQL_USER: diary_user
      MYSQL_PASSWORD: diary_password
    ports:
      - "3307:3306"
    volumes:
      - medical_db_data:/var/lib/mysql
    networks:
      - medical_network

  redis:
    image: redis:alpine
    container_name: medical_diary_redis
    ports:
      - "6380:6379"
    networks:
      - medical_network

volumes:
  medical_db_data:

networks:
  medical_network:
    driver: bridge
