openapi: 3.0.3
info:
  title: Medical Diary Plataforms API
  description: Public Endpoints and Internal Services API definition for Medical Diary Ecosystem
  version: 1.0.0
servers:
  - url: http://localhost:8084/
    description: Local Docker Enviroment
paths:
  /contato:
    post:
      summary: Envia uma requisição de Sac/Contato vindo do Site Institucional
      operationId: sendContactForm
      description: 'Salva os dados criptografados para fila inbox e despacha email (ShouldQueue).'
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - name
                - email
                - message
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
                subject:
                  type: string
                message:
                  type: string
      responses:
        '200':
          description: Formulário guardado e e-mail posicionado na fila oculta.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '429':
          description: Throttling Too Many Requests (Anti DDoS, 5 max/minuto)
  /api/appointments/available-times:
    get:
      summary: Retorna Grid de janelas Matemáticas livres no dia
      operationId: getAvailableTimes
      description: Verifica agendamentos já alocados, cruza com o array DoctorSchedules (Licenças e Plantões) e cospe janelas reais pra agendamento.
      parameters:
        - name: doctor_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: date
          in: query
          required: true
          description: 'Data no formato YYYY-MM-DD'
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Array de horas livres.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  example: '14:30'
  /attendance/stream:
    get:
      summary: TV Saguão - Server Sent Events (SSE)
      description: Endpoint de Streaming infinito em text/event-stream. Usado pela TV para tocar o som de Ping e as Vozes do Robô TTS.
      responses:
        200:
          description: Evento disparado quando um Médico OU um Guichê pressiona o Action Button.
          content:
            text/event-stream:
              schema:
                type: string
                example: "event: NewCall\ndata: {\"id\": \"uuid\", \"client_name\": \"Senha P001\", \"doctor_name\": \"Recepção\", \"room\": \"Guichê 1\", \"is_ticket\": true, \"ticket_type\": \"priority\"}\n\n"
  
  /api/tickets/generate:
    post:
      summary: Totem de Autoatedimento - Gerador de Senhas
      operationId: generateTotemTicket
      description: Requisitado pelo Servidor Node.JS Local (`/totem`) ligado na maquininha térmica para empurrar o layout do Ticket pro banco alocando seu sequencial de 0 a 999.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum: [common, priority]
      responses:
        '200':
          description: Sucesso ao salvar no banco.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  ticket:
                    type: string
                    example: "P005"
                  id:
                    type: string
                    format: uuid
